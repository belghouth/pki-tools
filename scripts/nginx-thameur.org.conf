# nginx vhost for thameur.org
# Serves the PKI Tools PHP application.
# Deploy to: /etc/nginx/sites-available/thameur.org
# Enable:    ln -s /etc/nginx/sites-available/thameur.org /etc/nginx/sites-enabled/
# Reload:    nginx -t && systemctl reload nginx

# Rate-limit zones — must live in the http{} context; this file is included there.
limit_req_zone $binary_remote_addr zone=ct_add:10m rate=10r/s;  # CT log submissions
limit_req_zone $binary_remote_addr zone=tsa:10m    rate=5r/s;   # TSA timestamp requests

# ── HTTP — redirect to HTTPS + ACME challenges ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name thameur.org www.thameur.org;

    # ACME HTTP-01 challenges — served from the webroot so a single
    # --http.webroot /var/www/thameur.org works for all domains (incl. pki.)
    location ^~ /.well-known/acme-challenge/ {
        root         /var/www/thameur.org;
        default_type "text/plain";
        try_files    $uri =404;
    }

    location / {
        return 301 https://thameur.org$request_uri;
    }
}

# ── www → apex redirect ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.thameur.org;

    ssl_certificate     /etc/lego/certificates/thameur.org.crt;
    ssl_certificate_key /etc/lego/certificates/thameur.org.key;

    include snippets/ssl-params.conf;

    return 301 https://thameur.org$request_uri;
}

# ── HTTPS — main application ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thameur.org;

    ssl_certificate     /etc/lego/certificates/thameur.org.crt;
    ssl_certificate_key /etc/lego/certificates/thameur.org.key;

    include snippets/ssl-params.conf;

    root  /var/www/thameur.org;
    index index.php;

    # Max upload size (CPS assessor accepts PDF uploads)
    client_max_body_size 16m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Block sensitive server-side directories ───────────────────────────────

    # Private CT log keys — must never be web-accessible
    location ^~ /pki-ca/ {
        deny all;
        return 403;
    }

    # Server scripts, PHP modules, PHP includes, cron jobs
    location ^~ /scripts/  { deny all; return 403; }
    location ^~ /modules/  { deny all; return 403; }
    location ^~ /includes/ { deny all; return 403; }
    location ^~ /cron/     { deny all; return 403; }

    # Dotfiles (.htaccess, .env, .git, …)
    location ~ /\. {
        deny all;
        return 403;
    }

    # ── CT Log API ────────────────────────────────────────────────────────────
    # POST /ct/v1/add-pre-chain   — submit precertificate chain, receive SCT
    # GET  /ct/v1/get-sth         — signed tree head
    # GET  /ct/v1/get-roots       — accepted root certificates
    # GET  /ct/v1/get-entries     — always empty (no persistence)
    #
    # The capture group $1 is forwarded as _ep, matching the .htaccess rewrite
    # used on the Apache side: RewriteRule ^ct/v1/([a-z][a-z-]*)$ …?_ep=$1
    location ~ ^/ct/v1/([a-z][a-z-]*)$ {
        # Tighter rate limit on the write endpoint only
        limit_req zone=ct_add burst=20 nodelay;

        fastcgi_pass        unix:/run/php/php8.3-fpm.sock;
        fastcgi_param       SCRIPT_FILENAME $document_root/ct_log.php;
        fastcgi_param       QUERY_STRING    _ep=$1&$query_string;
        fastcgi_read_timeout 10s;
        include             fastcgi_params;
    }

    # CT Log documentation page
    location = /ct {
        fastcgi_pass  unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/ct_log_doc.php;
        fastcgi_param QUERY_STRING    $query_string;
        include       fastcgi_params;
    }

    # ── TSA endpoint (RFC 3161) ───────────────────────────────────────────────
    # POST /tsa  Content-Type: application/timestamp-query → application/timestamp-reply
    # GET  /tsa  → redirects to tsa_doc.php
    location = /tsa {
        limit_req zone=tsa burst=10 nodelay;

        fastcgi_pass        unix:/run/php/php8.3-fpm.sock;
        fastcgi_param       SCRIPT_FILENAME $document_root/tsa.php;
        fastcgi_param       QUERY_STRING    $query_string;
        fastcgi_read_timeout 10s;
        include             fastcgi_params;
    }

    # ── Uploads directory — static only, no PHP execution ────────────────────
    location ^~ /uploads/ {
        location ~ \.php$ { deny all; return 403; }
        try_files $uri =404;
    }

    # ── PHP application ───────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass        unix:/run/php/php8.3-fpm.sock;
        fastcgi_param       SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 30s;
        include             fastcgi_params;
    }

    # ── Static assets — long cache ────────────────────────────────────────────
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/thameur.org.access.log;
    error_log  /var/log/nginx/thameur.org.error.log;
}
