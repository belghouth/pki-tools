# nginx log formats — shared across all vhosts
# Deploy to: /etc/nginx/conf.d/log-formats.conf
# (conf.d/ is included before sites-enabled/ so formats are available to all vhosts)

# ── Structured JSON access log ────────────────────────────────────────────────
# Consumed by cron/nginx_import.php → nginx_visits DB table → admin panel.
# escape=json ensures variable values are safe inside the JSON string.
# $msec  — Unix timestamp with millisecond precision (e.g. 1737039045.123)
# $http_cf_connecting_ip — real visitor IP when behind Cloudflare (may be empty
#   on direct connections; the import script falls back to $remote_addr).
log_format json_access escape=json
    '{"ms":$msec,'
    '"ip":"$http_cf_connecting_ip",'
    '"edge":"$remote_addr",'
    '"method":"$request_method",'
    '"host":"$host",'
    '"vhost":"$server_name",'
    '"uri":"$uri",'
    '"query":"$args",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"referer":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"https":"$https",'
    '"proto":"$server_protocol",'
    '"rt":$request_time,'
    '"cc":"$http_cf_ipcountry"}';
