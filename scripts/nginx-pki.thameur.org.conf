# nginx vhost for pki.thameur.org
# Serves the Meerkat Test PKI public files (certs + CRL).
# Deploy to: /etc/nginx/sites-available/pki.thameur.org
# Enable:    ln -s /etc/nginx/sites-available/pki.thameur.org /etc/nginx/sites-enabled/
# Reload:    nginx -t && systemctl reload nginx
#
# NOTE: the 443 block requires pki.thameur.org to be in the SAN of the lego
# certificate. Add it first via the renew command, then deploy this full config.

# HTTP — redirect to HTTPS + serve ACME challenges
server {
    listen 80;
    listen [::]:80;
    server_name pki.thameur.org;

    # ACME HTTP-01 challenge — served from the main site webroot so lego
    # can use a single --http.webroot /var/www/thameur.org for all domains
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/thameur.org;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — serve PKI files (requires pki.thameur.org in cert SAN)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pki.thameur.org;

    ssl_certificate     /etc/lego/certificates/thameur.org.crt;
    ssl_certificate_key /etc/lego/certificates/thameur.org.key;

    include snippets/ssl-params.conf;

    root /var/www/pki.thameur.org;
    index index.html;

    # Disable directory listing
    autoindex off;

    # Root CA certificate
    location ~* \.crt$ {
        default_type application/x-x509-ca-cert;
        try_files $uri =404;
    }

    # CRL
    location ~* \.crl$ {
        default_type application/pkix-crl;
        try_files $uri =404;
    }

    # Everything else — index.html or 404
    location / {
        try_files $uri $uri/ =404;
    }

    # Logging
    access_log /var/log/nginx/pki.thameur.org.access.log;
    error_log  /var/log/nginx/pki.thameur.org.error.log;
}
